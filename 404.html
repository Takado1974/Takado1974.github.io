<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takado - 404</title>
    <link rel="icon" type="image/png" href="/images/cropped-takado-logo-icon-32x32.png">
    <link rel="stylesheet" href="/style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .error-container {
            text-align: center;
            padding: 4rem 1rem;
        }
        .error-icon {
            font-size: 5rem;
            color: #f39c12;
            margin-bottom: 2rem;
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: #333;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.5rem;
            color: #555;
            margin-bottom: 2rem;
        }
        .back-home {
            display: inline-block;
            background-color: #333;
            color: #fff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .back-home:hover {
            background-color: #f39c12;
            color: #fff;
        }
    </style>
</head>
<body>
    <header class="top-nav">
        <nav>
            <div class="nav-container">
                <a href="/#home" class="nav-logo">
                    <img src="/images/cropped-takado-logo.png" alt="Takado Logo">
                </a>
            </div>
        </nav>
    </header>

    <div class="main-wrapper" style="justify-content: center;">
        <main id="content" style="max-width: 800px; flex: none; width: 100%;">
            <div class="error-container">
                <div class="error-icon">
                    <i class="fa-solid fa-circle-exclamation"></i>
                </div>
                <div class="error-code">404</div>
                <div class="error-message">
                    Etsimääsi sivu ei löytynyt / <br>
                    The page you were looking for was not found
                </div>
                <a href="/#home" class="back-home">
                    <i class="fa-solid fa-house"></i> Palaa etusivulle / Back to Home
                </a>
            </div>
        </main>
    </div>

    <footer class="main-footer">
        <div class="footer-columns">
            <div class="footer-column">
                <h3>Yhteystiedot / Contact</h3>
                <p><a href="https://www.google.com/maps/search/?api=1&query=Pihat%C3%B6rm%C3%A4+1D,+4.krs,+02240+Espoo" target="_blank"><i class="fa-solid fa-location-dot"></i> Pihatörmä 1D, 4.krs, 02240 Espoo</a></p>
                <p><a href="mailto:takado@takado.fi"><i class="fa-solid fa-envelope"></i> takado(at)takado.fi</a></p>
            </div>
            <div class="footer-column">
                <h3>Seuraa meitä / Social</h3>
                <p><a href="https://www.facebook.com/Takadory" target="_blank">Facebook</a></p>
                <p><a href="https://www.instagram.com/takado_ry/" target="_blank">Instagram</a></p>
            </div>
            <div class="footer-column">
                <h3>Jäsenille / Members</h3>
                <p><a href="https://takado.myclub.fi/" target="_blank">myClub</a></p>
            </div>
        </div>
    </footer>
</body>
</html>
